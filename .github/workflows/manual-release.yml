name: Manual Release (workflow_dispatch)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0-rc.1)'
        required: true
        type: string
      draft:
        description: 'Create as draft release?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # ── CLI binaries (Linux, macOS, Windows) ──────────────────────────────────

  build-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} -p rqbit
          mkdir -p builds
          cp target/${{ matrix.target }}/release/rqbit builds/rqbit-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rqbit-linux-${{ matrix.arch }}
          path: builds/rqbit-linux-${{ matrix.arch }}

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-apple-darwin
          - arch: arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} -p rqbit
          mkdir -p builds
          cp target/${{ matrix.target }}/release/rqbit builds/rqbit-macos-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rqbit-macos-${{ matrix.arch }}
          path: builds/rqbit-macos-${{ matrix.arch }}

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} -p rqbit
          mkdir -p builds
          cp target/${{ matrix.target }}/release/rqbit.exe builds/rqbit-windows-${{ matrix.arch }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rqbit-windows-${{ matrix.arch }}
          path: builds/rqbit-windows-${{ matrix.arch }}.exe

  # ── Create GitHub Release ─────────────────────────────────────────────────

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd builds
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          draft: ${{ github.event.inputs.draft }}
          generate_release_notes: true
          files: |
            builds/*